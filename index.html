<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaga JS - True Arcade Edition</title>
    <style>
        :root {
            --arcade-black: #020202;
            --arcade-red: #ff0000;
            --arcade-cyan: #00ffff;
            --arcade-yellow: #ffff00;
            --arcade-pink: #ff00ff;
            --arcade-blue: #0000ff;
            --arcade-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #080808;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-wrapper {
            position: relative;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 15px;
            border: 4px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #game-container {
            position: relative;
            width: 450px;
            height: 600px;
            background: var(--arcade-black);
            overflow: hidden;
            outline: 2px solid #000;
        }

        /* CRT Effect Overlays */
        #game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 25;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.4) 100%);
            z-index: 26;
            pointer-events: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            padding: 0 15px;
            z-index: 30;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
        }

        .header-label { font-size: 0.9rem; margin-bottom: 2px; }
        .red-text { color: var(--arcade-red); }
        .white-text { color: var(--arcade-white); }
        
        .flash { animation: arcade-flash 0.5s step-end infinite; }
        @keyframes arcade-flash { 
            50% { visibility: hidden; } 
        }

        #menu-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 40;
            text-align: center;
        }

        .title-logo {
            font-size: 4rem;
            color: var(--arcade-red);
            font-style: italic;
            text-shadow: 4px 4px 0 var(--arcade-blue);
            margin: 0;
        }

        .insert-coin {
            color: var(--arcade-cyan);
            margin: 40px 0;
            font-size: 1.2rem;
        }

        #touch-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 50;
        }

        .t-btn {
            width: 70px; height: 70px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #444;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
        }

        @media (max-width: 600px) {
            #game-wrapper { padding: 0; border: none; }
            #game-container { width: 100vw; height: 100vh; max-width: none; max-height: none; }
            #touch-controls { display: flex; }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-container">
            <div id="vignette"></div>
            
            <div id="ui-layer">
                <div>
                    <div class="header-label red-text flash">1UP</div>
                    <div id="score-display" class="white-text">00</div>
                </div>
                <div>
                    <div class="header-label red-text">HIGH SCORE</div>
                    <div id="high-score" class="white-text">20000</div>
                </div>
                <div>
                    <div class="header-label red-text">2UP</div>
                    <div class="white-text">00</div>
                </div>
            </div>

            <canvas id="gameCanvas"></canvas>

            <div id="menu-overlay">
                <h1 class="title-logo">Galaga</h1>
                <p style="color: var(--arcade-cyan); letter-spacing: 5px;">NAMCO REPLICA</p>
                <div class="insert-coin flash">INSERT COIN</div>
                <button class="insert-coin" id="start-btn" style="background:none; border:2px solid var(--arcade-cyan); cursor:pointer; padding: 10px 20px;">START GAME</button>
            </div>

            <div id="touch-controls">
                <div style="display: flex; gap: 15px;">
                    <div class="t-btn" id="l-btn">←</div>
                    <div class="t-btn" id="r-btn">→</div>
                </div>
                <div class="t-btn" id="f-btn" style="background: rgba(255,0,0,0.3); border-color: var(--arcade-red);">🚀</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const highScoreEl = document.getElementById('high-score');
        const menuOverlay = document.getElementById('menu-overlay');
        const startBtn = document.getElementById('start-btn');

        const WIDTH = 450;
        const HEIGHT = 600;
        const PIXEL_SIZE = 2.5; 

        let gameActive = false;
        let score = 0;
        let highScore = 20000;
        let lives = 3;
        let frame = 0;
        let level = 1;

        let player = null;
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let stars = [];
        let particles = [];

        const PALETTE = {
            R: '#FF0000', C: '#00FFFF', Y: '#FFFF00', P: '#FF00FF', B: '#5050FF', W: '#FFFFFF', G: '#00FF00', D: '#202020', '.': 'transparent'
        };

        const SPRITES = {
            player: [
                ".......WW.......", ".......WW.......", "......WRRW......", "......WBBW......", "......WBBW......", ".....WWWWWW.....", "...WWWWWWWWWW...", "..WWWWWWWWWWWW..", "..WWRRWWWWWRRW..", "..WWRRWWWWWRRW..", "WWWWWWWWWWWWWWWW", "WWWWWWWWWWWWWWWW", "RR.RR......RR.RR", "RR.RR......RR.RR"
            ],
            bee: [
                ["....YY....YY....", "...YYYY..YYYY...", "...YYYYBBYYYY...", "....YYBBBBYY....", ".....BBBBBB.....", ".....BBRRBB.....", ".....BBRRBB.....", "......BBBB......", ".....BB..BB.....", "....BB....BB...."],
                ["................", "....YY....YY....", "...YYYYBBYYYY...", "..YYYYBBBBYYYY..", "..YYYYBBBBYYYY..", "...YYBBBBBBYY...", ".....BBRRBB.....", ".....BBRRBB.....", "......BBBB......", ".....BB..BB....."]
            ],
            butterfly: [
                ["....PP....PP....", "...PPPP..PPPP...", "..PPPPWWPPPP....", "...PPWWWWPP.....", "....WWBBWW......", "....WWBBWW......", "...WWWWWWWW.....", "..WWWWWWWWWW....", "...WW....WW....."],
                ["................", "....PP....PP....", "...PPPPWWPPPP...", "..PPPPWWWWPPPP..", "..PPPPWWWWPPPP..", "...PPWWBBWWPP...", "....WWBBWW......", "....WWWWWW......", "...WWWWWWWW....."]
            ],
            boss: [
                ["....GG....GG....", "...GGGG..GGGG...", "..GGGGCBCGGGG...", "...GGCCCCCXG....", "....CCCCCC......", "....CCRRCC......", "...CCRRRRCC.....", "..CCCCRRCCCC....", "...CC....CC....."],
                ["................", "....GG....GG....", "...GGGGCBCGGGG...", "..GGGGCCCCCXGGGG.", "..GGGGCCCCCXGGGG.", "...GGCCCCCCXG...", "....CCRRCC......", "...CCRRRRCC.....", "..CCCC..CCCC...."]
            ],
            scorpion: [
                [
                    ".......RR.......",
                    "......RRRR......",
                    ".....RRRRRR.....",
                    "....RRRRRRRR....",
                    "...RRWWWWWWWR...",
                    "..RRWWWWWWWWWR..",
                    ".RRRRRRRRRRRRRR.",
                    "RRRRRRRRRRRRRRRR",
                    "RRRR..RRRR..RRRR",
                    "RRR....RR....RRR"
                ],
                [
                    ".......RR.......",
                    "......RRRR......",
                    ".....RRRRRR.....",
                    "....RRRRRRRR....",
                    "...RRWWWWWWWR...",
                    "..RRWWWWWWWWWR..",
                    ".RRWWWWWWWWWWRR.",
                    "RRRRRRRRRRRRRRRR",
                    ".RRRRRRRRRRRRRR.",
                    "....RRRRRRRR...."
                ]
            ]
        };

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        const touchState = { left: false, right: false, fire: false };
        function setupTouch(id, key) {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); touchState[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); touchState[key] = false; });
        }
        setupTouch('l-btn', 'left');
        setupTouch('r-btn', 'right');
        setupTouch('f-btn', 'fire');

        function drawPixelSprite(spriteArray, x, y, scale = PIXEL_SIZE) {
            spriteArray.forEach((row, rowIndex) => {
                for (let colIndex = 0; colIndex < row.length; colIndex++) {
                    const char = row[colIndex];
                    if (char !== '.' && PALETTE[char]) {
                        ctx.fillStyle = PALETTE[char];
                        ctx.fillRect(
                            x + (colIndex - row.length / 2) * scale,
                            y + (rowIndex - spriteArray.length / 2) * scale,
                            scale, scale
                        );
                    }
                }
            });
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * WIDTH,
                    y: Math.random() * HEIGHT,
                    speed: 0.5 + Math.random() * 3,
                    size: 1 + Math.random() * 1.5,
                    color: [PALETTE.W, PALETTE.W, PALETTE.C, PALETTE.Y, PALETTE.P][Math.floor(Math.random() * 5)]
                });
            }
        }

        function createExplosion(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, life: 1.0, color: color
                });
            }
        }

        class Player {
            constructor() {
                this.w = 40; this.h = 40;
                this.x = WIDTH / 2;
                this.y = HEIGHT - 80;
                this.cooldown = 0;
            }
            draw() { drawPixelSprite(SPRITES.player, this.x, this.y, 2.4); }
            update() {
                if (keys['ArrowLeft'] || touchState.left) this.x -= 4.5;
                if (keys['ArrowRight'] || touchState.right) this.x += 4.5;
                this.x = Math.max(25, Math.min(WIDTH - 25, this.x));
                if ((keys['Space'] || touchState.fire) && this.cooldown <= 0) {
                    bullets.push(new Bullet(this.x, this.y - 20, -1));
                    this.cooldown = 18;
                }
                if (this.cooldown > 0) this.cooldown--;
            }
        }

        class Bullet {
            constructor(x, y, dir) { this.x = x; this.y = y; this.dir = dir; }
            update() { this.y += (this.dir * (this.dir === -1 ? 12 : 5)); }
            draw() {
                ctx.fillStyle = this.dir === -1 ? PALETTE.C : PALETTE.R;
                ctx.fillRect(this.x - 2, this.y - 6, 4, 12);
                ctx.fillStyle = PALETTE.W;
                ctx.fillRect(this.x - 1, this.y - 2, 2, 6);
            }
        }

        class Enemy {
            constructor(tx, ty, type) {
                this.x = Math.random() * WIDTH; this.y = -50;
                this.targetX = tx; this.targetY = ty;
                this.type = type; this.state = 'entering';
                this.frameOffset = Math.random() * 60;
                this.scoreVal = type === 'bee' ? 100 : (type === 'butterfly' ? 160 : (type === 'scorpion' ? 200 : 400));
                this.rotation = 0; 
                this.diveSpeed = 0;
                this.diveOffset = (Math.random() - 0.5) * 2;
            }

            startSquadron() {
                if (this.state !== 'formation') return;
                this.state = 'diving';
                let recruited = 0;
                const myIndex = enemies.indexOf(this);
                for (let i = -2; i <= 2; i++) {
                    if (i === 0) continue;
                    let targetIdx = myIndex + i;
                    if (enemies[targetIdx] && enemies[targetIdx].state === 'formation' && recruited < 2) {
                        enemies[targetIdx].state = 'diving';
                        recruited++;
                    }
                }
            }

            update() {
                // Rotation Speed - Adjusted for smoother attack mode transition
                const rotationEase = 0.04; 
                const targetRotation = (this.state === 'diving') ? Math.PI : 0;

                if (Math.abs(this.rotation - targetRotation) > 0.01) {
                    // Start slow, accelerate rotation, settle at target
                    this.rotation += (targetRotation - this.rotation) * 0.08;
                } else {
                    this.rotation = targetRotation;
                }

                if (this.state === 'entering') {
                    this.diveSpeed = 0;
                    this.x += (this.targetX - this.x) * 0.05;
                    this.y += (this.targetY - this.y) * 0.05;
                    if (Math.hypot(this.x - this.targetX, this.y - this.targetY) < 1) this.state = 'formation';
                } else if (this.state === 'formation') {
                    this.diveSpeed = 0;
                    this.x = this.targetX + Math.sin(frame * 0.04) * 20;
                    this.y = this.targetY + Math.cos(frame * 0.02) * 5;
                    if (Math.random() < 0.0003 * level) this.startSquadron();
                } else if (this.state === 'diving') {
                    // Sync vertical acceleration with rotation progress
                    const rotationProgress = Math.min(1, Math.abs(this.rotation) / Math.PI);
                    
                    if (this.diveSpeed < 4.5) {
                        // Vertical acceleration is gated by rotation progress to feel "weightier"
                        this.diveSpeed += 0.05 * rotationProgress;
                    }
                    
                    this.y += this.diveSpeed;
                    this.x += Math.sin(this.y * 0.03 + this.diveOffset) * (14 * (this.diveSpeed / 4.5));
                    
                    if (Math.random() < 0.015 && this.y < player.y - 120) enemyBullets.push(new Bullet(this.x, this.y + 15, 1));
                    if (this.y > HEIGHT + 40) { this.y = -50; this.state = 'entering'; }
                }
            }

            draw() {
                const animFrame = (Math.floor((frame + this.frameOffset) / 15) % 2);
                const sprite = SPRITES[this.type][animFrame];
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                drawPixelSprite(sprite, 0, 0, 2.2);
                ctx.restore();
            }
        }

        function spawnWave() {
            enemies = [];
            const rows = 5, cols = 8;
            const offX = (WIDTH - (cols * 45)) / 2 + 22;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let type = 'bee';
                    if (r === 0) type = 'boss';
                    else if (r === 1) type = 'scorpion';
                    else if (r < 3) type = 'butterfly';
                    enemies.push(new Enemy(offX + c * 45, 100 + r * 42, type));
                }
            }
        }

        function loop() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, WIDTH, HEIGHT);
            stars.forEach(s => {
                s.y += s.speed; if (s.y > HEIGHT) s.y = 0;
                ctx.fillStyle = s.color; ctx.globalAlpha = Math.random() > 0.1 ? 0.7 : 0.3;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });
            ctx.globalAlpha = 1.0;

            if (gameActive) {
                frame++;
                player.update(); player.draw();
                bullets.forEach((b, i) => { b.update(); b.draw(); if (b.y < -30 || b.y > HEIGHT + 30) bullets.splice(i, 1); });
                enemyBullets.forEach((eb, i) => { eb.update(); eb.draw(); if (eb.y > HEIGHT + 30) enemyBullets.splice(i, 1); });
                enemies.forEach(e => { e.update(); e.draw(); });
                particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                    if (p.life <= 0) particles.splice(i, 1);
                    else { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fillRect(p.x, p.y, 4, 4); }
                });
                ctx.globalAlpha = 1.0;

                bullets.forEach((b, bi) => {
                    enemies.forEach((e, ei) => {
                        if (Math.hypot(b.x - e.x, b.y - e.y) < 22) {
                            createExplosion(e.x, e.y, PALETTE.R, 15);
                            enemies.splice(ei, 1); bullets.splice(bi, 1);
                            score += e.scoreVal; scoreEl.innerText = score.toString().padStart(2, '0');
                            if (score > highScore) { highScore = score; highScoreEl.innerText = highScore; }
                        }
                    });
                });

                enemyBullets.forEach((eb, i) => {
                    if (Math.hypot(eb.x - player.x, eb.y - player.y) < 20) {
                        createExplosion(player.x, player.y, PALETTE.W, 30);
                        enemyBullets.splice(i, 1); lives--;
                        if (lives <= 0) { gameActive = false; menuOverlay.style.display = 'flex'; document.querySelector('.insert-coin').innerText = "GAME OVER"; }
                        else { player.x = WIDTH / 2; }
                    }
                });

                if (enemies.length === 0) { level++; spawnWave(); }
            }
            requestAnimationFrame(loop);
        }

        startBtn.onclick = () => {
            score = 0; lives = 3; level = 1; scoreEl.innerText = "00";
            bullets = []; enemyBullets = []; enemies = [];
            player = new Player(); spawnWave();
            gameActive = true; menuOverlay.style.display = 'none';
        };

        window.onload = () => {
            canvas.width = WIDTH; canvas.height = HEIGHT;
            initStars(); requestAnimationFrame(loop);
        };
    </script>
</body>
</html>
